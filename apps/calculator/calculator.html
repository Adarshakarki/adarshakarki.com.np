<div class="calc-app">
  <!-- Scientific panel (placeholder) -->
  <div class="calc-scientific">
    <div class="calc-sci-row">
      <button class="btn-sci">(</button>
      <button class="btn-sci">)</button>
      <button class="btn-sci">mc</button>
      <button class="btn-sci">m+</button>
      <button class="btn-sci">m-</button>
      <button class="btn-sci">mr</button>
    </div>
    <div class="calc-sci-row">
      <button class="btn-sci">2<sup>nd</sup></button>
      <button class="btn-sci">x<sup>2</sup></button>
      <button class="btn-sci">x<sup>3</sup></button>
      <button class="btn-sci">x<sup>y</sup></button>
      <button class="btn-sci">e<sup>x</sup></button>
      <button class="btn-sci">10<sup>x</sup></button>
    </div>
    <div class="calc-sci-row">
      <button class="btn-sci"><sup>1</sup>/<sub>x</sub></button>
      <button class="btn-sci"><sup>2</sup>√x</button>
      <button class="btn-sci"><sup>3</sup>√x</button>
      <button class="btn-sci"><sup>y</sup>√x</button>
      <button class="btn-sci">ln</button>
      <button class="btn-sci">log<sub>10</sub></button>
    </div>
    <div class="calc-sci-row">
      <button class="btn-sci">x!</button>
      <button class="btn-sci">sin</button>
      <button class="btn-sci">cos</button>
      <button class="btn-sci">tan</button>
      <button class="btn-sci">e</button>
      <button class="btn-sci">EE</button>
    </div>
    <div class="calc-sci-row">
      <button class="btn-sci">Rand</button>
      <button class="btn-sci">sinh</button>
      <button class="btn-sci">cosh</button>
      <button class="btn-sci">tanh</button>
      <button class="btn-sci">π</button>
      <button class="btn-sci">Rad</button>
    </div>
  </div>

  <!-- Standard calculator -->
  <div class="calc-standard">
    <div class="calc-display">
      <div class="calc-expression" id="calc-expression"></div>
      <div class="calc-result" id="calc-result">0</div>
    </div>
    <div class="calc-buttons">
      <button class="btn-calc gray" onclick="calcClear()">AC</button>
      <button class="btn-calc gray" onclick="calcSign()">+/−</button>
      <button class="btn-calc gray" onclick="calcPercent()">%</button>
      <button class="btn-calc orange" onclick="calcOp('/')">÷</button>

      <button class="btn-calc" onclick="calcNum('7')">7</button>
      <button class="btn-calc" onclick="calcNum('8')">8</button>
      <button class="btn-calc" onclick="calcNum('9')">9</button>
      <button class="btn-calc orange" onclick="calcOp('*')">×</button>

      <button class="btn-calc" onclick="calcNum('4')">4</button>
      <button class="btn-calc" onclick="calcNum('5')">5</button>
      <button class="btn-calc" onclick="calcNum('6')">6</button>
      <button class="btn-calc orange" onclick="calcOp('-')">−</button>

      <button class="btn-calc" onclick="calcNum('1')">1</button>
      <button class="btn-calc" onclick="calcNum('2')">2</button>
      <button class="btn-calc" onclick="calcNum('3')">3</button>
      <button class="btn-calc orange" onclick="calcOp('+')">+</button>

      <button class="btn-calc wide" onclick="calcNum('0')">0</button>
      <button class="btn-calc" onclick="calcDot()">.</button>
      <button class="btn-calc orange" onclick="calcEquals()">=</button>
    </div>
  </div>
</div>
