<div class="music-app">
  <div class="music-sidebar">
    <div class="music-sidebar-title">Library</div>
    <ul class="music-playlist" id="music-playlist"></ul>
  </div>
  <div class="music-main">
    <div class="music-art-wrap">
      <img class="music-art-img" id="music-art-full" src="" alt="Album Art">
      <div class="music-art-placeholder" id="music-art-placeholder">♪</div>
    </div>
    <div class="music-info-full">
      <div class="music-title-full"  id="music-title-full">—</div>
      <div class="music-artist-full" id="music-artist-full">—</div>
    </div>
    <div class="music-seek-wrap">
      <span class="music-time" id="music-current">0:00</span>
      <input type="range" class="music-seek" id="music-seek" value="0" min="0" max="100" step="0.1">
      <span class="music-time" id="music-duration">0:00</span>
    </div>
    <div class="music-controls-full">
      <button class="music-btn" id="music-prev-full">
        <img src="apps/music/icons/skip-back.svg" class="music-icon" alt="prev">
      </button>
      <button class="music-btn music-btn-play" id="music-play-full">
        <img src="apps/music/icons/play.svg" class="music-icon" alt="play" id="music-play-icon">
      </button>
      <button class="music-btn" id="music-next-full">
        <img src="apps/music/icons/skip-forward.svg" class="music-icon" alt="next">
      </button>
    </div>
  </div>
</div>
